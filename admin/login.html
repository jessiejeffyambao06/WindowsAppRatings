<!doctype html>
<html>
  <head>
    <title>Admin Login</title>

    <!-- MODERN FONTS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* BACKGROUND */
      body {
        font-family: "Inter", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
      }

      /* CARD - GLASS STYLE */
      .card {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 18px;
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.25);
        border: 1px solid rgba(56, 189, 248, 0.2);
        text-align: center;
        width: 320px;
        position: relative;
      }

      /* HEADER */
      .card h2 {
        font-family: "Orbitron", sans-serif;
        margin-bottom: 5px;
        font-size: 26px;
        color: #38bdf8;
        letter-spacing: 1px;
      }

      /* SUBTEXT (ADDED LANG) */
      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 20px;
      }

      /* INPUTS */
      input {
        display: block;
        margin: 12px 0;
        padding: 12px;
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(2, 6, 23, 0.9);
        color: #e2e8f0;
        transition: 0.3s;
      }

      input::placeholder {
        color: #64748b;
      }

      input:focus {
        outline: none;
        border: 1px solid #38bdf8;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      }

      /* BUTTON */
      button {
        padding: 12px;
        width: 100%;
        margin-top: 10px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(to right, #38bdf8, #6366f1);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
      }

      /* ERROR TEXT */
      #error {
        margin-top: 12px;
        font-size: 13px;
        color: #f87171;
      }

      /* OPTIONAL DECORATION (ADDED LANG) */
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(56, 189, 248, 0.2),
          transparent
        );
        opacity: 0.3;
        pointer-events: none;
      }

      /* FOOTER TEXT (ADDED LANG) */
      .footer {
        margin-top: 15px;
        font-size: 11px;
        color: #64748b;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Admin Login</h2>
      <div class="subtitle">Secure Access • Feedback Dashboard</div>

      <input id="user" placeholder="Username" />
      <input id="pass" type="password" placeholder="Password" />

      <button onclick="login()">Login</button>

      <p id="error"></p>

      <div class="footer">© Ziontech Feedback System</div>
    </div>

    <script>
      function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;

        if (u === "admin" && p === "1234") {
          window.location = "dashboard.html";
        } else {
          document.getElementById("error").innerText = "Wrong login";
        }
      }
    </script>
  </body>
</html>
